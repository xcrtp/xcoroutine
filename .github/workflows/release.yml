name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup CMake and Ninja
        if: runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y cmake ninja-build clang-format
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cmake ninja
          fi

      - name: Setup CMake and Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja clang-format -y

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DXCOROUTINE_BUILD_EXAMPLES=ON -DXCOROUTINE_BUILD_TESTS=ON

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Run examples (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ -d "build/examples" ]; then
            for exe in build/examples/*_example; do
              if [ -f "$exe" ] || [ -f "$exe.exe" ]; then
                "$exe" || exit 1
              fi
            done
          else
            echo "No examples directory, skipping..."
          fi

      - name: Run examples (Windows)
        if: runner.os == 'Windows'
        run: |
          if (Test-Path build/examples) {
            Get-ChildItem -Path build/examples -Filter "*.exe" | ForEach-Object { & $_.FullName }
          } else {
            Write-Host "No examples directory, skipping..."
          }

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B release -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DXCOROUTINE_BUILD_EXAMPLES=ON \
            -DCMAKE_INSTALL_PREFIX=install \
            -DBUILD_TESTING=OFF
          cmake --build release --target install

          # Create archive
          cd install
          tar -czvf ../xcoroutine-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B release -G Ninja -DCMAKE_BUILD_TYPE=Release -DXCOROUTINE_BUILD_EXAMPLES=ON -DCMAKE_INSTALL_PREFIX=install -DBUILD_TESTING=OFF
          cmake --build release --target install

          # Create archive
          Compress-Archive -Path 'install/*' -DestinationPath 'xcoroutine-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}.zip'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcoroutine-${{ matrix.os }}
          path: xcoroutine-${{ steps.version.outputs.VERSION }}-${{ matrix.os }}.*
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: xcoroutine v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true
          files: |
            artifacts/xcoroutine-ubuntu-latest/*
            artifacts/xcoroutine-macos-latest/*
            artifacts/xcoroutine-windows-latest/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
